apiVersion: v1
kind: Pod
metadata:
  name: multi-container-simple
spec:
  containers:

  # Writer container
  - name: writer
    image: busybox
    command: ["/bin/sh", "-c"]
    args:
      - echo "Hello from writer container" >> /data/log.txt; sleep 3600
    volumeMounts:
      - name: shared-volume
        mountPath: /data

  # Reader container
  - name: reader
    image: busybox
    command: ["/bin/sh", "-c"]
    args:
      - cat /data/log.txt; sleep 3600
    volumeMounts:
      - name: shared-volume
        mountPath: /data

  volumes:
    - name: shared-volume
      emptyDir: {}